<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dursun Ali'nin Dünyası</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: inline-block; }
        h1 { color: #38bdf8; }
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #7dd3fc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Selam, Ben Dursun Ali!</h1>
        <p>Bu siteyi hiçbir uygulama indirmeden, sadece telefonumla kodladım.</p>
        <button onclick="selamVer()">Bana Tıkla!</button>
    </div>

    <script>
        function selamVer() {
            alert("Kod dünyasına ilk adımını attın! Tebrikler.");
        }
    </script>
</body>
</html>
